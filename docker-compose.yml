services:
  # =========================
  # INFRA
  # =========================
  # Portas de host na faixa 31xx (exclusiva do projeto) para não colidir
  # com outros containers/serviços da máquina. Portas internas dos containers
  # permanecem as padrão — a comunicação entre serviços usa service-name + porta interna.

  mongo:
    image: mongo:7
    container_name: payment-flow-mongo
    restart: always
    ports:
      - "3102:27017"
    volumes:
      - mongo_data:/data/db

  rabbitmq:
    image: rabbitmq:3-management
    container_name: payment-flow-rabbitmq
    restart: always
    ports:
      - "3103:5672"
      - "3104:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin

  # =========================
  # BACKEND (NestJS)
  # =========================

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: payment-flow-api
    restart: always
    ports:
      - "3100:3000"
    depends_on:
      - mongo
      - rabbitmq
    environment:
      PORT: 3000
      MONGO_URL: mongodb://mongo:27017/payment-flow
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      JWT_SECRET: super-secret-change-me-min-32-chars-long
      JWT_EXPIRES_IN: 15m
      REFRESH_SECRET: refresh-secret-change-me-min-32-chars-long
      REFRESH_EXPIRES_IN: 7d

  # =========================
  # FRONTEND (Vue 3)
  # =========================

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: payment-flow-web
    restart: always
    ports:
      - "3101:5173"
    depends_on:
      - api
    environment:
      # Aponta para a porta de host da API (3100)
      VITE_API_URL: http://localhost:3100

volumes:
  mongo_data:
